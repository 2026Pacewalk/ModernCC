# Nginx server block for Modern Crop Care Chemicals
# Copy to /etc/nginx/sites-available/moderncc and symlink into sites-enabled:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/moderncc
#   sudo ln -sf /etc/nginx/sites-available/moderncc /etc/nginx/sites-enabled/moderncc
#   sudo nginx -t && sudo systemctl reload nginx
# Replace SERVER_NAME with the real domain (or the VPS IP while DNS is pending).

server {
    listen 80;
    listen [::]:80;
    server_name SERVER_NAME;

    root /var/www/moderncc/current;
    index index.html;

    # SPA routing — always fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed build assets — cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Images — cache for 30 days
    location /images/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
